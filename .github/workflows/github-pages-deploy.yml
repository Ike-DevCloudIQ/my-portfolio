name: Full DevOps Pipeline 🚀

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy-site:
    name: Build & Deploy Site 🌐
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 📦
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 🛠️
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules 📦
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies 🧩
        run: npm install --legacy-peer-deps

      - name: Build project 🏗️
        run: npm run build

      - name: Test build output exists 🔍
        run: |
          if [ ! -f "build/index.html" ]; then
            echo "❌ Build failed: index.html not found!"
            exit 1
          else
            echo "✅ Build successful!"
          fi

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true
          commit_message: "🚀 Auto-deploy to GitHub Pages"

      - name: Site deployment done 🎉
        run: echo "✅ Site deployed successfully!"

  build-push-docker:
    name: Build & Push Docker Image 🐳
    runs-on: ubuntu-latest
    needs: build-deploy-site

    steps:
      - name: Checkout repository 📦
        uses: actions/checkout@v6

      - name: Set up Docker Buildx 🛠️
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub 🐳
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image 🚢
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ikedevcloudiq/my-portfolio:latest

      - name: Docker image build & push done 🎉
        run: echo "✅ Docker image build & push completed successfully!"